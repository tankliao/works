<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Shop JP — 週報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--tk-red:#FE2C55;--tk-cyan:#25F4EE;--bg:#080B14;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#E8EAF0;--muted:rgba(232,234,240,0.45);--up:#22D47B;--down:#FE2C55;--gold:#F7B731}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.blob-1{width:600px;height:600px;background:rgba(254,44,85,0.12);top:-200px;right:-100px}
.blob-2{width:500px;height:500px;background:rgba(37,244,238,0.10);bottom:-100px;left:-100px}
.container{max-width:1100px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}

/* LOADING STATE */
#loading-state{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--tk-red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--muted);font-size:14px}

/* NO DATA STATE */
#no-data-state{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center}
.no-data-icon{font-size:64px;margin-bottom:8px}
.no-data-title{font-size:22px;font-weight:700}
.no-data-desc{color:var(--muted);font-size:14px;line-height:1.7;max-width:360px}

/* REPORT */
#report-state{display:none}
header{padding:56px 0 40px;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border);margin-bottom:48px;flex-wrap:wrap;gap:16px}
.grad-text{background:linear-gradient(135deg,var(--tk-red),var(--tk-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;display:block}
header h1{font-size:clamp(22px,4vw,38px);font-weight:900;letter-spacing:-1px;line-height:1.15}
.header-meta{text-align:right}
.period{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:6px}
.generated{font-size:11px;color:rgba(255,255,255,0.25);font-family:'Space Mono',monospace}
.section-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--tk-cyan);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--tk-cyan),transparent);opacity:.3}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:48px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;position:relative;overflow:hidden;transition:transform .2s;animation:fadeUp .5s ease both}
.kpi-card:hover{transform:translateY(-3px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--tk-red),var(--tk-cyan))}
.kpi-card:nth-child(1){animation-delay:.05s}.kpi-card:nth-child(2){animation-delay:.1s}.kpi-card:nth-child(3){animation-delay:.15s}.kpi-card:nth-child(4){animation-delay:.2s}
.kpi-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase}
.kpi-value{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:10px}
.kpi-unit{font-size:14px;font-weight:400;color:var(--muted);margin-left:2px}
.wow{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
.wow.up::before{content:'↑ '}.wow.up{color:var(--up)}.wow.down::before{content:'↓ '}.wow.down{color:var(--down)}.wow.neutral{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px;animation:fadeUp .5s ease .2s both}
.card-title{font-size:14px;font-weight:700;margin-bottom:24px}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px}
canvas{max-height:220px}
.product-table{width:100%;border-collapse:collapse;font-size:13px}
.product-table th{text-align:left;padding:10px 12px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase}
.product-table td{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.product-table tr:last-child td{border-bottom:none}.product-table tr:hover td{background:rgba(255,255,255,0.03)}
.rank{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--muted)}
.rank.gold{color:#F7B731}.rank.silver{color:#BDC3C7}.rank.bronze{color:#CA6F1E}
.badge{display:inline-flex;padding:3px 8px;border-radius:6px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.badge.good{background:rgba(34,212,123,0.15);color:var(--up)}.badge.warn{background:rgba(254,44,85,0.15);color:var(--down)}.badge.hot{background:rgba(247,183,49,0.15);color:var(--gold)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--tk-red),var(--tk-cyan))}
.ai-section{background:linear-gradient(135deg,rgba(254,44,85,0.06),rgba(37,244,238,0.06));border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:36px;margin-bottom:20px;animation:fadeUp .5s ease .3s both}
.ai-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.ai-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--tk-red),var(--tk-cyan));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-title{font-size:16px;font-weight:700}.ai-subtitle{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px}
.ai-blocks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.ai-block-title{font-size:11px;font-family:'Space Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.ai-block-title.h{color:var(--tk-cyan)}.ai-block-title.a{color:var(--tk-red)}.ai-block-title.r{color:var(--gold)}
.ai-item{display:flex;gap:10px;margin-bottom:12px;font-size:13px;line-height:1.7;color:rgba(232,234,240,0.85)}
.ai-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px}
.ai-dot.c{background:var(--tk-cyan)}.ai-dot.r{background:var(--tk-red)}.ai-dot.g{background:var(--gold)}
footer{border-top:1px solid var(--border);padding-top:32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
footer .logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--tk-red),var(--tk-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
footer p{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}.ai-blocks{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}.header-meta{text-align:left}}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="container">

  <!-- Loading -->
  <div id="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">載入最新報告⋯</div>
  </div>

  <!-- No Data -->
  <div id="no-data-state">
    <div class="no-data-icon">📋</div>
    <div class="no-data-title">本週報告尚未發布</div>
    <div class="no-data-desc">管理員正在準備本週數據，請稍後再回來查看。<br>通常在每週一更新。</div>
  </div>

  <!-- Report -->
  <div id="report-state">
    <header>
      <div>
        <span class="brand-tag grad-text">TikTok Shop JP · 週報</span>
        <h1 id="rep-title">週次數據報告</h1>
      </div>
      <div class="header-meta">
        <div class="period" id="rep-period"></div>
        <div class="generated" id="rep-generated"></div>
      </div>
    </header>

    <div class="section-label">核心 KPI</div>
    <div class="kpi-grid" id="kpi-grid"></div>

    <div class="charts-grid">
      <div class="card"><div class="card-title">📈 本週 GMV 每日走勢</div><canvas id="gmvChart"></canvas></div>
      <div class="card"><div class="card-title">🔀 流量來源分析</div><canvas id="trafficChart"></canvas></div>
    </div>
    <div class="card"><div class="card-title">🎬 影片表現 Top 5</div><canvas id="videoChart" style="max-height:180px"></canvas></div>

    <div class="section-label">商品表現</div>
    <div class="card">
      <div class="card-title">🛍️ 商品排名（本週銷售額）</div>
      <table class="product-table">
        <thead><tr><th>#</th><th>商品名稱</th><th>曝光數</th><th>點擊率 CTR</th><th>轉換率 CVR</th><th>銷售額</th><th>狀態</th></tr></thead>
        <tbody id="product-tbody"></tbody>
      </table>
    </div>

    <div class="section-label">AI 分析建議</div>
    <div class="ai-section">
      <div class="ai-header">
        <div class="ai-icon">✦</div>
        <div>
          <div class="ai-title">本週 AI 洞察報告</div>
          <div class="ai-subtitle" id="ai-sub"></div>
        </div>
      </div>
      <div class="ai-blocks">
        <div><div class="ai-block-title h">本週亮點</div><div id="ai-h"></div></div>
        <div><div class="ai-block-title a">需要關注</div><div id="ai-a"></div></div>
        <div><div class="ai-block-title r">下週行動建議</div><div id="ai-r"></div></div>
      </div>
    </div>

    <footer>
      <div class="logo">TK SHOP ANALYTICS</div>
      <p id="footer-txt">每週更新 · Confidential</p>
    </footer>
  </div>

</div>
<script>
let charts = {};

async function loadReport() {
  try {
    const res = await fetch('/.netlify/functions/get-report');
    if (!res.ok) { showState('no-data'); return; }
    const data = await res.json();
    if (!data || !data.parsed) { showState('no-data'); return; }
    renderReport(data);
    showState('report');
  } catch(e) {
    showState('no-data');
  }
}

function showState(name) {
  document.getElementById('loading-state').style.display  = name==='loading' ? 'flex'  : 'none';
  document.getElementById('no-data-state').style.display  = name==='no-data' ? 'flex'  : 'none';
  document.getElementById('report-state').style.display   = name==='report'  ? 'block' : 'none';
}

function renderReport(data) {
  const {parsed, kpi, ai, generatedAt} = data;
  const {dailySales:S, videos:V, products:P, trafficData:T} = parsed;
  const n = S.length;

  document.getElementById('rep-period').textContent = `📅 ${kpi.dateRange.start} — ${kpi.dateRange.end}`;
  document.getElementById('rep-generated').textContent = `發布時間：${new Date(generatedAt).toLocaleString('zh-TW')}`;

  // KPI Cards
  const defs=[
    {key:'gmv',label:'週次 GMV',pre:'¥',unit:'円',fmt:v=>Math.round(v).toLocaleString()},
    {key:'orders',label:'訂單數',pre:'',unit:'件',fmt:v=>Math.round(v).toLocaleString()},
    {key:'plays',label:'影片播放總計',pre:'',unit:'次',fmt:v=>v>=10000?(v/10000).toFixed(1)+'万':v.toLocaleString()},
    {key:'aov',label:'平均客單價',pre:'¥',unit:'円',fmt:v=>Math.round(v).toLocaleString()},
  ];
  const grid=document.getElementById('kpi-grid');grid.innerHTML='';
  defs.forEach(d=>{
    const val=kpi[d.key],wc=val.wow>0?'up':val.wow<0?'down':'neutral',wt=val.wow!=null?`${Math.abs(val.wow)}% 較上週`:'—';
    grid.innerHTML+=`<div class="kpi-card"><div class="kpi-label">${d.label}</div><div class="kpi-value">${d.pre}${d.fmt(val.value)}<span class="kpi-unit">${d.unit}</span></div><div class="wow ${wc}">${wt}</div></div>`;
  });

  // GMV Chart
  const recent=S.slice(Math.max(0,n-7));
  if(charts.gmv)charts.gmv.destroy();
  const gc=document.getElementById('gmvChart').getContext('2d');
  const gr=gc.createLinearGradient(0,0,0,220);gr.addColorStop(0,'rgba(254,44,85,0.35)');gr.addColorStop(1,'rgba(254,44,85,0)');
  charts.gmv=new Chart(gc,{type:'line',data:{labels:recent.map(r=>r.date.slice(5)),datasets:[{data:recent.map(r=>r.gmv),borderColor:'#FE2C55',backgroundColor:gr,tension:.4,fill:true,pointBackgroundColor:'#FE2C55',pointRadius:5,pointHoverRadius:8}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(232,234,240,0.5)',font:{family:'Space Mono',size:10}}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(232,234,240,0.5)',font:{family:'Space Mono',size:10},callback:v=>'¥'+(v>=10000?(v/10000).toFixed(0)+'万':v)}}}}});

  // Traffic
  if(charts.traffic)charts.traffic.destroy();
  charts.traffic=new Chart(document.getElementById('trafficChart').getContext('2d'),{type:'doughnut',data:{labels:T.map(t=>t.label),datasets:[{data:T.map(t=>t.value),backgroundColor:['#FE2C55','#25F4EE','#F7B731','#9B59B6','rgba(255,255,255,0.2)','#2ECC71'],borderWidth:0,hoverOffset:6}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'rgba(232,234,240,0.6)',font:{family:'Noto Sans TC',size:11},padding:10,boxWidth:10}}}}});

  // Video
  if(charts.video)charts.video.destroy();
  if(V.length>0){charts.video=new Chart(document.getElementById('videoChart').getContext('2d'),{type:'bar',data:{labels:V.map(v=>v.name),datasets:[{label:'播放數',data:V.map(v=>v.plays),backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,'rgba(254,44,85,0.85)');g.addColorStop(1,'rgba(37,244,238,0.4)');return g},borderRadius:6}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(232,234,240,0.5)',font:{family:'Space Mono',size:10}}},y:{grid:{display:false},ticks:{color:'rgba(232,234,240,0.7)',font:{family:'Noto Sans TC',size:12}}}}}});}

  // Product Table
  const rc=['gold','silver','bronze','',''];
  const tb=document.getElementById('product-tbody');tb.innerHTML='';
  const mx=Math.max(...P.map(p=>p.ctr),1);
  P.forEach((p,i)=>{
    const lbl=p.status==='hot'?'表現優異':p.status==='warn'?'需要優化':'穩定';
    tb.innerHTML+=`<tr><td><span class="rank ${rc[i]||''}">${String(i+1).padStart(2,'0')}</span></td><td>${p.name}</td><td>${(p.impressions||0).toLocaleString()}</td><td><div class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.ctr/mx*100)}%"></div></div>${p.ctr.toFixed(1)}%</div></td><td>${p.cvr.toFixed(1)}%</td><td>¥${Math.round(p.sales).toLocaleString()}</td><td><span class="badge ${p.status}">${lbl}</span></td></tr>`;
  });

  // AI
  const mk=(items,dc)=>items.map(t=>`<div class="ai-item"><div class="ai-dot ${dc}"></div><span>${t}</span></div>`).join('');
  document.getElementById('ai-h').innerHTML=mk(ai.highlights||[],'c');
  document.getElementById('ai-a').innerHTML=mk(ai.alerts||[],'r');
  document.getElementById('ai-r').innerHTML=mk(ai.actions||[],'g');
  document.getElementById('ai-sub').textContent=`依據本週數據自動生成 · ${new Date(generatedAt).toLocaleDateString('zh-TW')}`;
}

loadReport();
</script>
</body>
</html>
